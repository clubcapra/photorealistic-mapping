# Camera intrinsics for color_mesh.py.
#
# Each block is one entry per cam_<dir>_optical_frame, with the calibration
# computed via scripts/calibrate_camera.py against the per-cam captures in
# calib_captures_by_cam/<dir>/. All four are fisheye (Kannala-Brandt 4-param);
# distortion_model: equidistant tells color_mesh.py to use cv2.fisheye.projectPoints.
#
# Resolution: the bag streams are 640x480 (the stretched IP-cam format —
# fy/fx ~= 1.336 is geometrically correct for this resolution). The
# 640x360 captures for north/east/west were scaled to 640x480 by
# multiplying fy and cy by 4/3; the K matrices below describe the
# bag's native frames directly.
#
# Source: calibration_{north,south,east,west}.npz (repo root).

# NORTH cam (192.168.2.32) — calibrated 0.509px RMS, fisheye model
cam_north_optical_frame:
  width: 640
  height: 480
  fx: 396.0401
  fy: 530.3065
  cx: 324.1765
  cy: 245.8992
  distortion_model: equidistant
  D: [-0.084294, -0.020708, 0.127925, -0.122339]

