rove_slam_node:
  ros__parameters:
    # ─── Frames ───────────────────────────────────────────────────────────
    # Standard nav2-friendly frame chain: <map_frame> → odom → base_link.
    # We default to `new_map` (not `map`) for the world frame so the SLAM
    # tree doesn't compete with any external `map` publisher (e.g. an
    # existing map_server, or stale `/tf_static` data leaked from a
    # replayed rosbag). The downstream nav2 costmap in this package is
    # configured to use `new_map` as its global_frame too.
    map_frame: "new_map"
    odom_frame: "odom"
    base_frame: "base_link"

    # ─── KISS-ICP front-end ───────────────────────────────────────────────
    # Tuned for non-repetitive Livox MID-360 indoor scans. See project
    # memory / docs for rationale.
    # NOTE: defaults below are tuned for the Webots sim demo (small indoor
    # world, narrow-FOV simulated lidar). For real Rove data restore:
    #   voxel_size_m: 0.30   min_range_m: 2.0   max_range_m: 100.0
    voxel_size_m: 0.15           # voxel hash resolution for SLAM (m)
    max_range_m: 30.0            # discard points farther than this (m)
    min_range_m: 0.5             # discard points closer than this (m) —
                                  # sim robot is 0.7 m wide (not 2 m like the real Rove)
    max_points_per_voxel: 50     # caps stored points per voxel (jitter ↓)
    deskew: true                 # per-point timestamp deskew when available
    min_intensity: 0.0           # intensity floor (0 keeps everything)
    # urdf_extrinsic applies an old hardcoded lidar→base transform
    # (rpy=(0, 30°, 180°), xyz=(-0.30, 0, 0.318)) that matched a single-lidar
    # mount used on pre-2026-06 bags. The current Rove (rove_standard.urdf,
    # dual MID-360) has a different mount, and the sim publishes identity
    # base→livox_frame. Default off — turn on ONLY when replaying old bags.
    urdf_extrinsic: false

    # ─── Obstacles cloud ──────────────────────────────────────────────────
    # nav2 costmap subscribes /cloud_obstacles. We re-publish the SLAM
    # local map as a Z-banded PointCloud2 a few times per second; tweak
    # the band to match your robot's traversal envelope.
    obstacle_z_min: 0.10         # floor of the obstacle band (m, world)
    obstacle_z_max: 1.50         # ceiling of the obstacle band (m, world)
    obstacle_publish_period_s: 0.5  # re-publish cadence (s)
