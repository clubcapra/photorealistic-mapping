# Stage D — loop closure & graph optimisation.
# Defaults: rtabmap stock values mostly; LoopThr=0.11 (rtabmap default),
# LoopRatio=0.9 (gentle), MaxRetrieved=2 (default), OptimizeMaxError=3.0
# (default), ProximityBySpace=true (use spatial proximity for loop links).
name: stage_d_loop_closure
description: |
  Similarity threshold, max retrieved, graph optimiser.
params:
  Rtabmap/LoopThr:
    type: float
    low: 0.05
    high: 0.30
    default: 0.11
  Rtabmap/LoopRatio:
    type: float
    low: 0.0
    high: 1.0
    default: 0.9
  Rtabmap/MaxRetrieved:
    type: int
    low: 1
    high: 5
    default: 2
  RGBD/OptimizeMaxError:
    type: float
    low: 0.0
    high: 3.0
    default: 3.0
  RGBD/ProximityBySpace:
    type: categorical
    choices: ['true', 'false']
    default: 'true'
  RGBD/LinearUpdate:
    type: float
    low: 0.01
    high: 0.5
    default: 0.1
  RGBD/AngularUpdate:
    type: float
    low: 0.01
    high: 0.5
    default: 0.1
